
services:
  main_app:
    build: ./services/main_app
    image: main_app:ft_transcendence
    container_name: main_app
    ports:
      - 3000:3000
    networks:
      - my_network
    env_file:
      - ./services/main_app/.env

  database:
    build: ./services/mariadb
    image: mariadb:ft_transcendence
    container_name: mariadb
    networks:
      - my_network
    restart: always

networks:
  my_network: 
